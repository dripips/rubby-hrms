      telegram_test_ok: Тестовое сообщение ушло в Telegram
      telegram_test_fail: Не получилось — Telegram вернул %{code}
      connect: подключить
      note: Выбор какие уведомления приходят в каждый канал — на вкладке Уведомления.
      test_title: Проверка
      slack_step_1_html: Открой <a href='https://api.slack.com/apps?new_app=1' target='_blank' rel='noopener'>api.slack.com/apps</a> → <strong>Create New App → From scratch</strong>, выбери workspace и любое имя.
      slack_step_2: В меню слева — Features → Incoming Webhooks, активируй переключатель.
      slack_step_3: Внизу страницы — Add New Webhook to Workspace, выбери канал (можно личный direct-message с собой) → Allow.
      slack_step_4: Скопируй полученный URL (начинается с https://hooks.slack.com/services/...) и впиши ниже.
      tg_step_1_html: 'Открой бота компании в Telegram: <a href=''%{bot_link}'' target=''_blank'' rel=''noopener''><strong>@%{bot_name}</strong></a> → нажми <strong>Start</strong>.'
      tg_step_2_html: 'Узнай свой chat_id: открой <a href=''https://t.me/userinfobot'' target=''_blank'' rel=''noopener''>@userinfobot</a>, нажми Start — он пришлёт тебе твой ID (число).'
      tg_step_3: Впиши chat_id ниже и нажми Сохранить. После — нажми «Тест», бот напишет тебе подтверждение.
      tg_not_configured: Telegram-бот компании ещё не настроен. Попроси HR/IT настроить его в /settings/communications — тогда здесь появится ссылка на бот.
      tg_get_chat_id_html: Узнать свой chat_id заранее можно через <a href='https://t.me/userinfobot' target='_blank' rel='noopener'>@userinfobot</a> — открой и нажми Start.
      tg_step_1_v2_html: Открой бота компании <a href='%{bot_link}' target='_blank' rel='noopener'><strong>@%{bot_name}</strong></a> и нажми <strong>Start</strong>. <em>Бот ничего не ответит — это нормально.</em> Так Telegram разрешает боту слать тебе уведомления (anti-spam policy).
      tg_step_2_v2_html: Открой <a href='https://t.me/userinfobot' target='_blank' rel='noopener'><strong>@userinfobot</strong></a> → Start — он пришлёт твой chat_id (число типа <code>123456789</code>). Скопируй его.
      tg_step_3_v2: Впиши chat_id ниже → Сохранить → нажми «Тест». Если всё ок — бот пришлёт тебе подтверждение.
      tg_bot_silent: Наш бот не отвечает на сообщения — он только шлёт уведомления. Свой chat_id узнавай через @userinfobot.
      tg_one_click_title: Подключить Telegram одной кнопкой
      tg_one_click_subtitle: Откроется бот → нажми Start → готово. Без копирования chat_id.
      tg_one_click_btn: Открыть Telegram
      tg_one_click_hint: Подключи Telegram одной кнопкой — откроется бот, ты жмёшь Start, мы сами получим твой chat_id.
      tg_manual_toggle: Подключить вручную (если кнопка не работает)
      tg_manual_step1_html: Открой <a href='%{bot_link}' target='_blank' rel='noopener'>@%{bot_name}</a> → Start.
      tg_manual_step2_html: Узнай chat_id через <a href='https://t.me/userinfobot' target='_blank' rel='noopener'>@userinfobot</a> → Start.
