      test_telegram: Тест
      updated: Интеграции сохранены
      no_slack: Сначала впиши Slack webhook URL
      no_telegram: Сначала впиши Telegram chat_id
      no_bot_token: Админ не настроил бота. Обратись в HR/IT
      slack_test_ok: Тестовое сообщение ушло в Slack
