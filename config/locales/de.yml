      title: Integrationen
      hint: Verbinde Slack und Telegram, um Benachrichtigungen im Messenger zu erhalten, nicht nur im HRMS.
      slack_title: Slack
      slack_hint_html: Gehe zu <a href='https://api.slack.com/messaging/webhooks' target='_blank' rel='noopener'>api.slack.com/messaging/webhooks</a>, erstelle einen Incoming Webhook für den gewünschten Kanal und füge die URL unten ein.
      slack_url_label: Slack Webhook URL
      test_slack: Test
      telegram_title: Telegram
      telegram_hint: Sende /start an den Firmenbot (HR / IT gibt dir den @username), der Bot antwortet mit deiner chat_id — füge sie unten ein.
      telegram_chat_id_label: Telegram chat_id
      test_telegram: Test
      updated: Integrationen gespeichert
      no_slack: Trage zuerst die Slack-Webhook-URL ein
      no_telegram: Trage zuerst die Telegram chat_id ein
      no_bot_token: Admin hat den Bot nicht konfiguriert. HR/IT fragen
      slack_test_ok: Testnachricht an Slack gesendet
      slack_test_fail: Fehlgeschlagen — Slack antwortete %{code}
      telegram_test_ok: Testnachricht an Telegram gesendet
      telegram_test_fail: Fehlgeschlagen — Telegram antwortete %{code}
      connect: verbinden
      note: Welche Benachrichtigungen wohin gehen — auf der Registerkarte Benachrichtigungen wählen.
      test_title: Test
      slack_step_1_html: Öffne <a href='https://api.slack.com/apps?new_app=1' target='_blank' rel='noopener'>api.slack.com/apps</a> → <strong>Create New App → From scratch</strong>, Workspace und beliebigen Namen wählen.
      slack_step_2: Linke Menüleiste — Features → Incoming Webhooks, Schalter aktivieren.
      slack_step_3: Unten — Add New Webhook to Workspace, Kanal wählen (eigener DM geht auch) → Allow.
      slack_step_4: URL kopieren (beginnt mit https://hooks.slack.com/services/...) und unten einfügen.
      tg_step_1_html: 'Öffne den Firmenbot in Telegram: <a href=''%{bot_link}'' target=''_blank'' rel=''noopener''><strong>@%{bot_name}</strong></a> → tippe <strong>Start</strong>.'
      tg_step_2_html: 'chat_id herausfinden: <a href=''https://t.me/userinfobot'' target=''_blank'' rel=''noopener''>@userinfobot</a> öffnen, Start tippen — er schickt dir deine numerische ID.'
      tg_step_3: chat_id unten einfügen und Speichern. Dann «Test» klicken — der Bot antwortet mit Bestätigung.
      tg_not_configured: Firmen-Telegram-Bot ist noch nicht eingerichtet. Bitte HR/IT, ihn in /settings/communications einzurichten — dann erscheint der Bot-Link hier.
      tg_get_chat_id_html: Du kannst deine chat_id vorab über <a href='https://t.me/userinfobot' target='_blank' rel='noopener'>@userinfobot</a> herausfinden — öffnen und Start tippen.
      tg_step_1_v2_html: Öffne den Firmenbot <a href='%{bot_link}' target='_blank' rel='noopener'><strong>@%{bot_name}</strong></a> und tippe <strong>Start</strong>. <em>Der Bot antwortet nicht — das ist normal.</em> So erlaubt Telegram dem Bot, dir Benachrichtigungen zu senden (Anti-Spam).
      tg_step_2_v2_html: Öffne <a href='https://t.me/userinfobot' target='_blank' rel='noopener'><strong>@userinfobot</strong></a> → Start — er sendet dir deine chat_id (eine Zahl wie <code>123456789</code>). Kopiere sie.
      tg_step_3_v2: chat_id unten einfügen → Speichern → «Test» klicken. Wenn alles ok, sendet der Bot eine Bestätigung.
      tg_bot_silent: Unser Bot antwortet nicht auf Nachrichten — er sendet nur Benachrichtigungen. Deine chat_id über @userinfobot.
      tg_one_click_title: Telegram per Knopfdruck verbinden
      tg_one_click_subtitle: Bot öffnet sich → tippe Start → fertig. Ohne chat_id zu kopieren.
      tg_one_click_btn: Telegram öffnen
      tg_one_click_hint: Verbinde Telegram per Knopfdruck — Bot öffnet sich, du tippst Start, wir erhalten deine chat_id automatisch.
      tg_manual_toggle: Manuell verbinden (falls der Knopf nicht funktioniert)
      tg_manual_step1_html: Öffne <a href='%{bot_link}' target='_blank' rel='noopener'>@%{bot_name}</a> → Start.
      tg_manual_step2_html: chat_id über <a href='https://t.me/userinfobot' target='_blank' rel='noopener'>@userinfobot</a> → Start.
      tg_manual_step3: chat_id einfügen und Speichern.
      tg_webhook_off: 'One-Click-Bindung nicht verfügbar — Admin hat den Webhook nicht registriert. Manuell verbinden:'
      tg_bot_missing: Firmen-Telegram-Bot ist nicht eingerichtet — HR/IT fragen.
